<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FM MIX PARAGUAY</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#000,#111);
color:white;
text-align:center;
}

/* header */
.header{
padding:20px;
font-size:22px;
font-weight:bold;
}

/* boton radio */
.boton{
width:100px;
height:100px;
border-radius:50%;
background:#00ffcc;
color:black;
font-size:35px;
display:flex;
align-items:center;
justify-content:center;
margin:30px auto;
cursor:pointer;
}

/* info */
.hora{font-size:22px;}
.clima{font-size:18px;margin-top:10px;}
.monedas{margin-top:10px;color:#00ff00;}

/* diarios */
.diarios{
margin-top:20px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.diarios img{
width:90%;
max-width:350px;
border-radius:12px;
box-shadow:0 0 15px #000;
}

.diarios p{
margin-top:10px;
font-size:14px;
color:#ccc;
}
</style>
</head>

<body>

<div class="header">📻 FM MIX PARAGUAY EN VIVO</div>

<div class="boton" onclick="toggleRadio()" id="btn">▶</div>

<audio id="radio">
<source src="https://uk6freenew.listen2myradio.com/live.mp3?typeportmount=s2_11746_stream_961139605" type="audio/mpeg">
</audio>

<div class="hora" id="hora"></div>
<div class="clima" id="clima">Cargando clima...</div>
<div class="monedas" id="monedas">Cargando monedas...</div>

<!-- 🗞️ TAPAS DE DIARIOS -->
<div class="diarios" id="diarios"></div>

<script>

// ELEMENTOS
const radio = document.getElementById("radio");
const btn = document.getElementById("btn");
const horaEl = document.getElementById("hora");
const climaEl = document.getElementById("clima");
const monedasEl = document.getElementById("monedas");
const diariosEl = document.getElementById("diarios");

let activo=false;

// 🎧 RADIO
function toggleRadio(){
if(!activo){
radio.play().catch(()=>{});
btn.innerHTML="⏸";
activo=true;
}else{
radio.pause();
btn.innerHTML="▶";
activo=false;
}
}

// 🔁 RECONEXIÓN
setInterval(()=>{
if(activo && radio.paused){
radio.load();
radio.play().catch(()=>{});
}
},5000);

// 🕒 HORA
setInterval(()=>{
horaEl.innerHTML="🕒 "+new Date().toLocaleTimeString();
},1000);

// 🌤️ CLIMA ROTATIVO
let ciudades=["Buenos Aires","Asuncion","Madrid"];
let i=0;

async function clima(){
try{
let res=await fetch("https://wttr.in/"+ciudades[i]+"?format=3");
let data=await res.text();
climaEl.innerHTML="🌍 "+data;
i=(i+1)%ciudades.length;
}catch{
climaEl.innerHTML="Error clima";
}
}

clima();
setInterval(clima,20000);
setInterval(clima,3600000);

// 💵 MONEDAS
async function monedas(){
try{
let res=await fetch("https://open.er-api.com/v6/latest/USD");
let data=await res.json();

let ars=data.rates.ARS;
let pyg=data.rates.PYG;
let eur=data.rates.EUR;

monedasEl.innerHTML=`
💵 USD→ARS ${ars.toFixed(2)} 🇦🇷<br>
💵 USD→PYG ${pyg.toFixed(2)} 🇵🇾<br>
💱 ARS→PYG ${(pyg/ars).toFixed(2)}<br>
💶 EUR→ARS ${(ars/eur).toFixed(2)}
`;
}catch{
monedasEl.innerHTML="Error monedas";
}
}

monedas();
setInterval(monedas,3600000);

// 🗞️ TAPAS DIARIOS (ROTACIÓN)
let listaDiarios=[
{
nombre:"ABC Color Paraguay",
url:"https://www.abc.com.py",
img:"https://image.thum.io/get/width/800/https://www.abc.com.py"
},
{
nombre:"Última Hora Paraguay",
url:"https://www.ultimahora.com",
img:"https://image.thum.io/get/width/800/https://www.ultimahora.com"
},
{
nombre:"Clarín Argentina",
url:"https://www.clarin.com",
img:"https://image.thum.io/get/width/800/https://www.clarin.com"
},
{
nombre:"El País España",
url:"https://elpais.com",
img:"https://image.thum.io/get/width/800/https://elpais.com"
}
];

let index=0;

function mostrarDiario(){
let d=listaDiarios[index];

diariosEl.innerHTML=`
<a href="${d.url}" target="_blank">
<img src="${d.img}">
</a>
<p>🗞️ ${d.nombre}</p>
`;

index=(index+1)%listaDiarios.length;
}

mostrarDiario();
setInterval(mostrarDiario,10000);

</script>

</body>
</html>
