<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FM Mix Paraguay</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff0000">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
  text-align: center;
}

header {
  background: red;
  padding: 15px;
  font-size: 20px;
}

button {
  margin: 10px;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: red;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<header>📻 FM MIX PARAGUAY</header>

<h3>En vivo 24/7 🔥</h3>

<iframe src="https://radiofmmixparaguayenvivo.blogspot.com/2026/04/radio-fm-mix-paraguay-247.html" width="100%" height="300"></iframe>

<br>

<button id="btnInstalar" style="display:none;">📲 Instalar App</button>

<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('btnInstalar').style.display = 'inline-block';
});

document.getElementById('btnInstalar').addEventListener('click', () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
  }
});

// Service Worker REAL
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
