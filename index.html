<script>

// 🎧 RADIO AUTO PLAY INTELIGENTE
let radio = document.getElementById("radio");

function playRadio(){
radio.play();
}

function pauseRadio(){
radio.pause();
}

// 🔥 INTENTA SONAR SOLO
window.addEventListener("load", ()=>{
let playPromise = radio.play();

if(playPromise !== undefined){
playPromise.catch(()=>{
console.log("Autoplay bloqueado, requiere click");
});
}
});

// 🔁 RECONEXIÓN AUTOMÁTICA
radio.onerror = function(){
setTimeout(()=>{
radio.load();
radio.play();
},3000);
};

</script>
