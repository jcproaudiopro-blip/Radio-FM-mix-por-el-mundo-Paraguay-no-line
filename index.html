<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FM MIX PARAGUAY</title>

<link rel="manifest" href="manifest.json">

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:white;
text-align:center;
}

.header{
padding:20px;
font-size:22px;
font-weight:bold;
}

.boton{
width:100px;
height:100px;
border-radius:50%;
background:#00ffcc;
color:black;
font-size:35px;
display:flex;
align-items:center;
justify-content:center;
margin:30px auto;
cursor:pointer;
box-shadow:0 0 25px #00ffcc;
}

.hora{font-size:22px;}
.clima{font-size:18px;margin-top:10px;}
.monedas{margin-top:10px;color:#00ff00;}

.noticias{
margin-top:20px;
padding:10px;
font-size:14px;
text-align:left;
max-width:400px;
margin:auto;
}

.diarios{
margin-top:20px;
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
}

.diarios img{
height:150px;
border-radius:10px;
}

.install{
position:fixed;
top:10px;
right:10px;
background:#00c853;
padding:10px;
border-radius:10px;
display:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="install" id="installBtn">📲 Instalar App</div>

<div class="header">📻 FM MIX PARAGUAY</div>

<div class="boton" onclick="toggleRadio()" id="btn">▶</div>

<audio id="radio">
<source src="https://uk21freenew.listen2myradio.com/live.mp3?typeportmount=s2_8973_stream_61144961" type="audio/mpeg">
</audio>

<div class="hora" id="hora"></div>
<div class="clima" id="clima"></div>
<div class="monedas" id="monedas"></div>

<div class="noticias" id="noticias"></div>

<!-- 📰 TAPAS DIARIOS -->
<div class="diarios" id="diarios"></div>

<script>

// 🎧 RADIO
let radio = document.getElementById("radio");
let btn = document.getElementById("btn");
let activo = false;

function toggleRadio(){
if(!activo){
radio.play();
btn.innerHTML="⏸";
activo=true;
}else{
radio.pause();
btn.innerHTML="▶";
activo=false;
}
}

// 🔁 RECONEXIÓN
setInterval(()=>{
if(activo && radio.paused){
radio.load();
radio.play().catch(()=>{});
}
},5000);

// 🕒 HORA
setInterval(()=>{
hora.innerHTML = "🕒 " + new Date().toLocaleTimeString();
},1000);

// 🌤️ CLIMA
let ciudades = ["Buenos Aires","Asuncion","Madrid"];
let i=0;

async function clima(){
let res = await fetch("https://wttr.in/"+ciudades[i]+"?format=3");
let data = await res.text();
clima.innerHTML="🌍 "+data;
i=(i+1)%ciudades.length;
}
clima();
setInterval(clima,20000);

// 📰 NOTICIAS
async function noticias(){
let res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss?hl=es-419");
let data = await res.json();

let html="";
data.items.slice(0,5).forEach(n=>{
html+="📰 "+n.title+"<br><br>";
});

noticias.innerHTML=html;
}
noticias();
setInterval(noticias,60000);

// 💵 MONEDAS
async function monedas(){
let res = await fetch("https://open.er-api.com/v6/latest/USD");
let data = await res.json();

monedas.innerHTML = `
USD/ARS: ${data.rates.ARS.toFixed(2)} 🇦🇷<br>
USD/PYG: ${data.rates.PYG.toFixed(2)} 🇵🇾
`;
}
monedas();
setInterval(monedas,60000);

// 📰 TAPAS DIARIOS (SE ACTUALIZA SOLO)
function diarios(){
diarios.innerHTML = `
<img src="https://www.clarin.com/rss/lo-ultimo/" onerror="this.src='https://via.placeholder.com/150'">
<img src="https://www.lanacion.com.ar/resizer/" onerror="this.src='https://via.placeholder.com/150'">
<img src="https://www.abc.com.py/resizer/" onerror="this.src='https://via.placeholder.com/150'">
<img src="https://elpais.com/resizer/" onerror="this.src='https://via.placeholder.com/150'">
`;
}
diarios();

// 📲 INSTALAR
let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt = e;
document.getElementById("installBtn").style.display="block";
});

installBtn.onclick=()=>{
if(deferredPrompt){
deferredPrompt.prompt();
}
};

</script>

</body>
</html>
