<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FM Mix Paraguay</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff0000">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  text-align: center;
}

/* MENU */
.menu {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 25px;
  cursor: pointer;
}

/* CONTENIDO */
.container {
  margin-top: 80px;
}

img {
  width: 150px;
  margin-bottom: 20px;
}

h1 {
  color: red;
  font-size: 28px;
}

/* BOTON PLAY */
.play {
  margin: 30px auto;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: 3px solid yellow;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
}

/* REDES */
.redes {
  margin-top: 30px;
}

.redes span {
  margin: 10px;
  font-size: 22px;
}

/* BOTONES */
button {
  margin: 10px;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: red;
  color: white;
  font-size: 16px;
}
</style>

</head>

<body>

<div class="menu">☰</div>

<div class="container">

<img src="https://cdn-icons-png.flaticon.com/512/727/727245.png">

<h1>TU ESTACIÓN<br>DE RADIO</h1>

<div class="play" onclick="playRadio()">▶</div>

<audio id="radio" src="https://srv10.streamingradio.ar/8256/;" preload="none"></audio>

<div class="redes">
  <span>📘</span>
  <span>📸</span>
  <span>🐦</span>
  <span>📱</span>
</div>

<button id="btnInstalar" style="display:none;">📲 Instalar App</button>
<button onclick="compartir()">🔗 Compartir</button>

</div>

<script>
// RADIO
function playRadio() {
  document.getElementById("radio").play();
}

// INSTALAR
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("btnInstalar").style.display = 'inline-block';
});

document.getElementById("btnInstalar").addEventListener('click', () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
  }
});

// COMPARTIR
function compartir() {
  if (navigator.share) {
    navigator.share({
      title: 'FM Mix Paraguay',
      text: 'Escuchá la radio en vivo',
      url: window.location.href
    });
  } else {
    alert("Copiá este link y compartilo: " + window.location.href);
  }
}

// SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
