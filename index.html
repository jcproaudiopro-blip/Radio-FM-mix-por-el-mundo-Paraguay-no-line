<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FM MIX PARAGUAY</title>

<link rel="manifest" href="manifest.json">

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
}

/* fondo */
.bg{
position:fixed;
width:100%;
height:100%;
background:url('logo.png') center/cover no-repeat;
filter:brightness(0.3);
z-index:-1;
}

/* logo */
.logo{
width:170px;
margin-top:20px;
border-radius:20px;
}

/* título */
h1{font-size:20px}

/* botón play */
.play{
width:90px;
height:90px;
border-radius:50%;
background:white;
color:black;
font-size:35px;
display:flex;
align-items:center;
justify-content:center;
margin:20px auto;
}

/* ecualizador */
.eq{
display:flex;
justify-content:center;
gap:5px;
margin-top:10px;
}

.eq div{
width:5px;
height:20px;
background:#00ff00;
animation:anim 1s infinite ease-in-out;
}

.eq div:nth-child(2){animation-delay:0.2s}
.eq div:nth-child(3){animation-delay:0.4s}
.eq div:nth-child(4){animation-delay:0.6s}

@keyframes anim{
0%,100%{height:10px}
50%{height:30px}
}

/* hora */
.hora{margin-top:10px}

/* canción */
.song{
font-size:14px;
margin-top:10px;
color:#00ffcc;
}

/* clima */
.clima{
font-size:14px;
margin-top:10px;
}

/* noticias */
.noticias{
position:fixed;
bottom:0;
width:100%;
background:black;
color:#00ff00;
padding:10px;
white-space:nowrap;
overflow:hidden;
}

.noticias span{
display:inline-block;
padding-left:100%;
animation:scroll 25s linear infinite;
}

@keyframes scroll{
from{transform:translateX(0);}
to{transform:translateX(-100%);}
}

/* instalar */
.install{
position:fixed;
top:10px;
right:10px;
background:#00c853;
padding:10px;
border-radius:10px;
display:none;
}

/* whatsapp */
.whatsapp{
position:fixed;
bottom:70px;
right:15px;
background:#25d366;
padding:12px;
border-radius:50%;
font-size:20px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="install" id="installBtn">📲 Instalar</div>

<img src="logo.png" class="logo">

<h1>FM MIX PARAGUAY</h1>

<div class="hora" id="hora"></div>

<div class="song" id="song">🎵 Cargando...</div>

<div class="clima" id="clima"></div>

<div class="play" onclick="playRadio()">▶</div>

<div class="eq">
<div></div><div></div><div></div><div></div>
</div>

<audio id="radio" src="https://stream.zeno.fm/2gnl1yo7ugcvv"></audio>

<div class="noticias">
<span id="noticiasTexto">Cargando noticias...</span>
</div>

<a href="https://wa.me/5491131725838" class="whatsapp">💬</a>

<script>

// RADIO
function playRadio(){
document.getElementById("radio").play();
}

// HORA
setInterval(()=>{
document.getElementById("hora").innerHTML =
"🕒 " + new Date().toLocaleTimeString();
},1000);

// CLIMA ROTATIVO
let ciudades=["Asuncion","Buenos Aires","Madrid"];
let i=0;

async function clima(){
let res=await fetch("https://wttr.in/"+ciudades[i]+"?format=3");
let data=await res.text();
document.getElementById("clima").innerHTML="🌎 "+data;
i=(i+1)%3;
}
clima();
setInterval(clima,10000);

// NOTICIAS
async function noticias(){
let res=await fetch("https://api.allorigins.win/raw?url=https://news.google.com/rss?hl=es-419");
let text=await res.text();
let parser=new DOMParser();
let xml=parser.parseFromString(text,"text/xml");
let items=xml.querySelectorAll("item");

let lista=[];
items.forEach((item,index)=>{
if(index<10){
lista.push(item.querySelector("title").textContent);
}
});

document.getElementById("noticiasTexto").innerHTML=
"📰 "+lista.join(" 🔴 ");
}
noticias();
setInterval(noticias,3600000);

// CANCIÓN EN VIVO (ZENO)
async function song(){
try{
let res=await fetch("https://api.zeno.fm/mounts/metadata/subscribe/2gnl1yo7ugcvv");
document.getElementById("song").innerHTML="🎵 En vivo";
}catch{
document.getElementById("song").innerHTML="🎵 FM MIX EN VIVO";
}
}
song();

// INSTALAR
let deferredPrompt;
window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt=e;
document.getElementById("installBtn").style.display="block";
});

document.getElementById("installBtn").addEventListener("click",()=>{
deferredPrompt.prompt();
});

</script>

</body>
</html>
