<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FM MIX PARAGUAY</title>

<style>
body {
  margin:0;
  font-family: Arial;
  color:white;
  text-align:center;
  background: url('https://chat.openai.com/mnt/data/0.png') no-repeat center center fixed;
  background-size: cover;
}

.overlay {
  background: rgba(0,0,0,0.7);
  min-height: 100vh;
  padding: 20px;
}

h1 {
  margin-top: 20px;
  font-size: 28px;
}

.play {
  margin: 30px auto;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid yellow;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
  font-size:16px;
}

.section {
  margin-top:30px;
  background: rgba(0,0,0,0.6);
  padding:15px;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="overlay">

<h1>📻 FM MIX PARAGUAY</h1>

<div class="play">▶</div>

<audio id="radio" autoplay>
  <source src="https://srv10.streamingradio.ar/8256/;" type="audio/mpeg">
</audio>

<br>

<button onclick="instalar()">📲 Instalar</button>
<button onclick="compartir()">🔗 Compartir</button>

<div class="section">
<h3>📰 Noticias</h3>
<p id="noticias">Cargando noticias...</p>
</div>

<div class="section">
<h3>💲 Cotización</h3>
<p id="dolar">Cargando dólar...</p>
</div>

</div>

<script>
// AUTO PLAY (forzado)
window.onload = function() {
  let radio = document.getElementById("radio");
  radio.play().catch(()=>{});
}

// COMPARTIR
function compartir() {
  if (navigator.share) {
    navigator.share({
      title: 'FM MIX PARAGUAY',
      text: 'Escuchá la radio en vivo 24/7',
      url: window.location.href
    });
  } else {
    alert("Copiá este link: " + window.location.href);
  }
}

// INSTALAR
function instalar() {
  alert("Para instalar: tocá los 3 puntos del navegador y 'Agregar a pantalla de inicio'");
}

// NOTICIAS SIMPLE (RSS)
fetch('https://api.allorigins.win/raw?url=https://www.abc.com.py/rss/')
.then(res => res.text())
.then(data => {
  let parser = new DOMParser();
  let xml = parser.parseFromString(data, "text/xml");
  let items = xml.querySelectorAll("item");
  let texto = "";
  items.forEach((el, i) => {
    if(i < 3){
      texto += "• " + el.querySelector("title").textContent + "<br>";
    }
  });
  document.getElementById("noticias").innerHTML = texto;
});

// DOLAR SIMPLE
fetch('https://api.exchangerate-api.com/v4/latest/USD')
.then(res => res.json())
.then(data => {
  document.getElementById("dolar").innerHTML = 
    "USD → ARS: " + data.rates.ARS + "<br>USD → PYG: " + data.rates.PYG;
});
</script>

</body>
</html>
