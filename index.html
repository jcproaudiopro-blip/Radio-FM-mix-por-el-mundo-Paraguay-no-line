<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FM MIX PARAGUAY</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#000,#111);
color:white;
text-align:center;
}

.header{
padding:20px;
font-size:22px;
font-weight:bold;
}

.boton{
width:100px;
height:100px;
border-radius:50%;
background:#00ffcc;
color:black;
font-size:35px;
display:flex;
align-items:center;
justify-content:center;
margin:30px auto;
cursor:pointer;
}

.hora{font-size:22px;}
.clima{font-size:18px;margin-top:10px;}
.monedas{margin-top:10px;color:#00ff00;}

.noticias{
margin-top:20px;
padding:10px;
font-size:14px;
text-align:left;
max-width:400px;
margin:auto;
}
</style>
</head>

<body>

<div class="header">📻 FM MIX PARAGUAY EN VIVO</div>

<div class="boton" onclick="toggleRadio()" id="btn">▶</div>

<audio id="radio">
<source src="https://uk6freenew.listen2myradio.com/live.mp3?typeportmount=s2_11746_stream_961139605" type="audio/mpeg">
</audio>

<div class="hora" id="hora"></div>
<div class="clima" id="clima">Cargando clima...</div>
<div class="monedas" id="monedas">Cargando monedas...</div>

<div class="noticias" id="noticias">Cargando noticias...</div>

<script>

// ELEMENTOS
const radio = document.getElementById("radio");
const btn = document.getElementById("btn");
const horaEl = document.getElementById("hora");
const climaEl = document.getElementById("clima");
const noticiasEl = document.getElementById("noticias");
const monedasEl = document.getElementById("monedas");

let activo = false;

// 🎧 RADIO
function toggleRadio(){
if(!activo){
radio.play().catch(()=>{});
btn.innerHTML="⏸";
activo=true;
}else{
radio.pause();
btn.innerHTML="▶";
activo=false;
}
}

// 🔁 RECONEXIÓN
setInterval(()=>{
if(activo && radio.paused){
radio.load();
radio.play().catch(()=>{});
}
},5000);

// 🕒 HORA
setInterval(()=>{
horaEl.innerHTML = "🕒 " + new Date().toLocaleTimeString();
},1000);

// 🌤️ CLIMA
let ciudades = ["Buenos Aires","Asuncion","Madrid"];
let i = 0;

async function cargarClima(){
try{
let res = await fetch("https://wttr.in/"+ciudades[i]+"?format=3");
let data = await res.text();
climaEl.innerHTML = "🌍 " + data;
i = (i+1)%ciudades.length;
}catch{
climaEl.innerHTML = "Error clima";
}
}
cargarClima();
setInterval(cargarClima,20000);

// 📰 NOTICIAS
async function cargarNoticias(){
try{
let res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss?hl=es-419");
let data = await res.json();

let html="";
data.items.slice(0,5).forEach(n=>{
html += "📰 "+n.title+"<br><br>";
});

noticiasEl.innerHTML = html;

}catch{
noticiasEl.innerHTML="Error noticias";
}
}
cargarNoticias();
setInterval(cargarNoticias,60000);

// 💵 MONEDAS
async function cargarMonedas(){
try{
let res = await fetch("https://open.er-api.com/v6/latest/USD");
let data = await res.json();

monedasEl.innerHTML = `
USD → ARS: ${data.rates.ARS.toFixed(2)}<br>
USD → PYG: ${data.rates.PYG.toFixed(2)}
`;

}catch{
monedasEl.innerHTML="Error monedas";
}
}
cargarMonedas();
setInterval(cargarMonedas,60000);

</script>

</body>
</html>
