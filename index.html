<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FM MIX PARAGUAY</title>

<link rel="manifest" href="manifest.json">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#000,#111);
color:white;
text-align:center;
}

/* FONDO CON LOGO */
.bg{
position:fixed;
width:100%;
height:100%;
background:url('logo.png') center/cover no-repeat;
opacity:0.15;
z-index:-1;
}

/* HEADER */
.header{
padding:20px;
font-size:22px;
font-weight:bold;
}

/* BOTÓN RADIO */
.boton{
width:100px;
height:100px;
border-radius:50%;
background:#00ffcc;
color:black;
font-size:35px;
display:flex;
align-items:center;
justify-content:center;
margin:30px auto;
cursor:pointer;
box-shadow:0 0 25px #00ffcc;
}

/* INFO */
.hora{font-size:22px;}
.clima{font-size:18px;margin-top:10px;}
.monedas{margin-top:10px;color:#00ff00;}

/* NOTICIAS */
.noticias{
margin-top:20px;
padding:10px;
font-size:14px;
text-align:left;
max-width:400px;
margin:auto;
}

/* INSTALAR */
.install{
position:fixed;
top:10px;
right:10px;
background:#00c853;
padding:10px;
border-radius:10px;
display:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="install" id="installBtn">📲 Instalar</div>

<div class="header">📻 FM MIX PARAGUAY EN VIVO</div>

<div class="boton" onclick="toggleRadio()" id="btn">▶</div>

<audio id="radio" preload="auto">
<source src="https://uk21freenew.listen2myradio.com/live.mp3?typeportmount=s2_8973_stream_61144961" type="audio/mpeg">
</audio>

<div class="hora" id="hora"></div>
<div class="clima" id="clima">Cargando clima...</div>
<div class="monedas" id="monedas">Cargando monedas...</div>

<div class="noticias" id="noticias">📰 Cargando noticias...</div>

<script>

// 🎧 RADIO
let radio = document.getElementById("radio");
let btn = document.getElementById("btn");
let activo = false;

function toggleRadio(){
if(!activo){
radio.play().catch(()=>{});
btn.innerHTML="⏸";
activo=true;
}else{
radio.pause();
btn.innerHTML="▶";
activo=false;
}
}

// 🔁 RECONEXIÓN
setInterval(()=>{
if(activo && radio.paused){
radio.load();
radio.play().catch(()=>{});
}
},5000);

// 🕒 HORA
setInterval(()=>{
document.getElementById("hora").innerHTML =
"🕒 " + new Date().toLocaleTimeString();
},1000);

// 🌤️ CLIMA
let ciudades = ["Buenos Aires","Asuncion","Madrid"];
let i = 0;

async function cargarClima(){
try{
let res = await fetch("https://wttr.in/"+ciudades[i]+"?format=3");
let data = await res.text();
document.getElementById("clima").innerHTML="🌍 "+data;
i=(i+1)%ciudades.length;
}catch{
document.getElementById("clima").innerHTML="⚠️ Error clima";
}
}

cargarClima();
setInterval(cargarClima,20000);

// 📰 NOTICIAS (FUNCIONANDO)
async function cargarNoticias(){
try{
let res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss?hl=es-419&gl=AR&ceid=AR:es");
let data = await res.json();

let html="";
data.items.slice(0,5).forEach(n=>{
html += `<div style="margin-bottom:10px">📰 ${n.title}</div>`;
});

document.getElementById("noticias").innerHTML = html;

}catch{
document.getElementById("noticias").innerHTML="⚠️ Error noticias";
}
}

cargarNoticias();
setInterval(cargarNoticias,60000);

// 💵 MONEDAS (REAL)
async function cargarMonedas(){
try{
let res = await fetch("https://open.er-api.com/v6/latest/USD");
let data = await res.json();

let ars = data.rates.ARS;
let pyg = data.rates.PYG;
let eur = data.rates.EUR;

document.getElementById("monedas").innerHTML = `
💵 USD → ARS: ${ars.toFixed(2)} 🇦🇷<br>
💵 USD → PYG: ${pyg.toFixed(2)} 🇵🇾<br>
💶 EUR → USD: ${(1/eur).toFixed(2)} 🌍
`;

}catch{
document.getElementById("monedas").innerHTML="⚠️ Error monedas";
}
}

cargarMonedas();
setInterval(cargarMonedas,60000);

// 📲 INSTALAR
let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt = e;
document.getElementById("installBtn").style.display="block";
});

document.getElementById("installBtn").onclick = ()=>{
if(deferredPrompt){
deferredPrompt.prompt();
}
};

</script>

</body>
</html>
