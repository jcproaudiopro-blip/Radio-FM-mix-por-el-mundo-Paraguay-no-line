<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FM MIX PARAGUAY</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#000,#111);
color:white;
text-align:center;
}

.header{
padding:20px;
font-size:22px;
font-weight:bold;
}

.boton{
width:100px;
height:100px;
border-radius:50%;
background:#00ffcc;
color:black;
font-size:35px;
display:flex;
align-items:center;
justify-content:center;
margin:30px auto;
cursor:pointer;
}

/* ticker noticias */
.ticker{
margin-top:20px;
background:#111;
padding:10px;
overflow:hidden;
white-space:nowrap;
}

.ticker span{
display:inline-block;
padding-left:100%;
animation:scroll 20s linear infinite;
}

@keyframes scroll{
from{transform:translateX(0);}
to{transform:translateX(-100%);}
}

.clima, .monedas, .hora{
margin-top:10px;
}
</style>
</head>

<body>

<div class="header">📻 FM MIX PARAGUAY EN VIVO</div>

<div class="boton" onclick="toggleRadio()" id="btn">▶</div>

<audio id="radio">
<source src="https://uk6freenew.listen2myradio.com/live.mp3?typeportmount=s2_11746_stream_961139605" type="audio/mpeg">
</audio>

<div class="hora" id="hora"></div>
<div class="clima" id="clima">Cargando clima...</div>
<div class="monedas" id="monedas">Cargando monedas...</div>

<!-- 📰 NOTICIAS ROTATIVAS -->
<div class="ticker">
<span id="noticias">📰 Cargando noticias...</span>
</div>

<script>

// ELEMENTOS
const radio = document.getElementById("radio");
const btn = document.getElementById("btn");
const horaEl = document.getElementById("hora");
const climaEl = document.getElementById("clima");
const noticiasEl = document.getElementById("noticias");
const monedasEl = document.getElementById("monedas");

let activo=false;

// 🎧 RADIO
function toggleRadio(){
if(!activo){
radio.play().catch(()=>{});
btn.innerHTML="⏸";
activo=true;
}else{
radio.pause();
btn.innerHTML="▶";
activo=false;
}
}

// 🔁 RECONEXIÓN
setInterval(()=>{
if(activo && radio.paused){
radio.load();
radio.play().catch(()=>{});
}
},5000);

// 🕒 HORA
setInterval(()=>{
horaEl.innerHTML="🕒 "+new Date().toLocaleTimeString();
},1000);

// 🌤️ CLIMA ROTATIVO
let ciudades=["Buenos Aires","Asuncion","Madrid"];
let i=0;

async function actualizarClima(){
try{
let res=await fetch("https://wttr.in/"+ciudades[i]+"?format=3");
let data=await res.text();
climaEl.innerHTML="🌍 "+data;
i=(i+1)%ciudades.length;
}catch{
climaEl.innerHTML="Error clima";
}
}

actualizarClima();
setInterval(actualizarClima,20000); // rota
setInterval(actualizarClima,3600000); // actualiza cada hora

// 📰 NOTICIAS TICKER
async function actualizarNoticias(){
try{
let res=await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss?hl=es-419");
let data=await res.json();

let texto="";
data.items.slice(0,8).forEach(n=>{
texto += " 🔴 "+n.title+" | ";
});

noticiasEl.innerHTML=texto;

}catch{
noticiasEl.innerHTML="Error noticias";
}
}

actualizarNoticias();
setInterval(actualizarNoticias,3600000);

// 💵 MONEDAS GLOBAL
async function actualizarMonedas(){
try{
let res=await fetch("https://open.er-api.com/v6/latest/USD");
let data=await res.json();

let ars=data.rates.ARS;
let pyg=data.rates.PYG;
let eur=data.rates.EUR;

monedasEl.innerHTML=`
💵 USD→ARS ${ars.toFixed(2)} 🇦🇷 |
USD→PYG ${pyg.toFixed(2)} 🇵🇾 |
EUR→ARS ${(ars/eur).toFixed(2)} |
ARS→PYG ${(pyg/ars).toFixed(2)}
`;

}catch{
monedasEl.innerHTML="Error monedas";
}
}

actualizarMonedas();
setInterval(actualizarMonedas,3600000);

</script>

</body>
</html>
