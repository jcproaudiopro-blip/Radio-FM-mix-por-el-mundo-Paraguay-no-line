<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FM MIX PARAGUAY</title>

<link rel="manifest" href="manifest.json">

<style>
body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:black;
}

/* fondo */
.bg{
position:fixed;
width:100%;
height:100%;
background:url('logo.png') center/cover no-repeat;
filter:brightness(0.4);
z-index:-1;
}

/* logo */
.logo{
width:180px;
margin-top:20px;
border-radius:20px;
}

/* título */
h1{
font-size:22px;
}

/* botón */
.play{
width:100px;
height:100px;
border-radius:50%;
background:white;
color:black;
font-size:40px;
display:flex;
align-items:center;
justify-content:center;
margin:20px auto;
}

/* hora */
.hora{
font-size:18px;
margin-top:10px;
}

/* clima */
.clima{
font-size:14px;
margin-top:10px;
}

/* noticias */
.noticias{
position:fixed;
bottom:0;
width:100%;
background:black;
color:#00ff00;
padding:10px;
white-space:nowrap;
overflow:hidden;
}

.noticias span{
display:inline-block;
padding-left:100%;
animation:scroll 25s linear infinite;
}

@keyframes scroll{
from{transform:translateX(0);}
to{transform:translateX(-100%);}
}

/* botón instalar */
.install{
position:fixed;
top:10px;
right:10px;
background:#00c853;
color:white;
padding:10px;
border-radius:10px;
display:none;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="install" id="installBtn">📲 Instalar</div>

<img src="logo.png" class="logo">

<h1>FM MIX PARAGUAY</h1>

<div class="hora" id="hora"></div>
<div class="clima" id="clima">Cargando clima...</div>

<div class="play" onclick="playRadio()">▶</div>

<audio id="radio" src="https://stream.zeno.fm/2gnl1yo7ugcvv"></audio>

<div class="noticias">
<span id="noticiasTexto">Cargando noticias...</span>
</div>

<script>

// RADIO
function playRadio(){
document.getElementById("radio").play();
}

// HORA
setInterval(()=>{
document.getElementById("hora").innerHTML =
"🕒 " + new Date().toLocaleTimeString();
},1000);

// CLIMA ROTATIVO
let ciudades = ["Asuncion","Buenos Aires","Madrid"];
let i=0;

async function clima(){
try{
let res = await fetch("https://wttr.in/"+ciudades[i]+"?format=3");
let data = await res.text();

document.getElementById("clima").innerHTML =
"🌎 " + data;

i = (i+1)%3;

}catch{
document.getElementById("clima").innerHTML="Error clima";
}
}

clima();
setInterval(clima,10000);

// NOTICIAS REALES
async function noticias(){
try{
let res = await fetch("https://api.allorigins.win/raw?url=https://news.google.com/rss?hl=es-419&gl=AR&ceid=AR:es-419");
let text = await res.text();

let parser = new DOMParser();
let xml = parser.parseFromString(text,"text/xml");
let items = xml.querySelectorAll("item");

let lista = [];

items.forEach((item,index)=>{
if(index<10){
lista.push(item.querySelector("title").textContent);
}
});

document.getElementById("noticiasTexto").innerHTML =
"📰 " + lista.join(" 🔴 ");

}catch{
document.getElementById("noticiasTexto").innerHTML="Noticias no disponibles";
}
}

noticias();
setInterval(noticias,3600000);

// INSTALAR APP
let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt = e;
document.getElementById("installBtn").style.display="block";
});

document.getElementById("installBtn").addEventListener("click",()=>{
deferredPrompt.prompt();
});

</script>

</body>
</html>
