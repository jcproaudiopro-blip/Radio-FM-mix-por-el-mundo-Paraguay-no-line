<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FM MIX PARAGUAY</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
}

.logo{
width:180px;
margin-top:20px;
border-radius:20px;
}

.hora{font-size:26px;margin-top:10px;}
.clima{font-size:18px;margin-top:10px;}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:20px;
font-size:16px;
cursor:pointer;
}

.play{background:#00ffcc;color:black;}
.stop{background:#ff0033;color:white;}

.noticias{
margin-top:20px;
padding:10px;
font-size:14px;
}

.monedas{
margin-top:10px;
color:#00ff00;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<div class="hora" id="hora"></div>
<div class="clima" id="clima">Cargando clima...</div>

<!-- 🎧 AUDIO -->
<audio id="radio" controls>
<source src="https://uk21freenew.listen2myradio.com/live.mp3" type="audio/mpeg">
</audio>

<br>

<button class="play" onclick="playRadio()">▶ ESCUCHAR</button>
<button class="stop" onclick="pauseRadio()">⏸ CORTAR</button>

<div class="monedas" id="monedas"></div>

<div class="noticias" id="noticias">📰 Cargando noticias...</div>

<script>

// 🎧 RADIO (REINTENTO REAL)
let radio = document.getElementById("radio");

function playRadio(){
radio.play();
}

function pauseRadio(){
radio.pause();
}

// 🔁 RECONEXIÓN AUTOMÁTICA
setInterval(()=>{
if(radio.paused){
radio.load();
}
},5000);

// 🕒 HORA
setInterval(()=>{
document.getElementById("hora").innerHTML =
"🕒 " + new Date().toLocaleTimeString();
},1000);

// 🌤️ CLIMA
let ciudades = ["Buenos Aires","Asuncion","Madrid"];
let i = 0;

async function clima(){
try{
let res = await fetch("https://wttr.in/"+ciudades[i]+"?format=3");
let data = await res.text();

document.getElementById("clima").innerHTML = "🌍 " + data;

i = (i+1)%ciudades.length;

}catch{
document.getElementById("clima").innerHTML="Error clima";
}
}

clima();
setInterval(clima,20000);

// 📰 NOTICIAS (ALTERNATIVA QUE FUNCIONA)
async function noticias(){
try{
let res = await fetch("https://api.allorigins.win/raw?url=https://news.google.com/rss?hl=es-419");
let text = await res.text();

let parser = new DOMParser();
let xml = parser.parseFromString(text,"text/xml");
let items = xml.querySelectorAll("item");

let html="";

items.forEach((item,i)=>{
if(i<5){
let titulo = item.querySelector("title").textContent;
html += "🔴 " + titulo + "<br><br>";
}
});

document.getElementById("noticias").innerHTML = html;

}catch{
document.getElementById("noticias").innerHTML="Error noticias";
}
}

noticias();
setInterval(noticias,60000);

// 💵 MONEDAS
function monedas(){
document.getElementById("monedas").innerHTML =
"💵 USD/ARS: 1100 🔴 USD/PYG: 7300 🔵 EUR: 1200 🟢";
}

monedas();
setInterval(monedas,60000);

</script>

</body>
</html>
