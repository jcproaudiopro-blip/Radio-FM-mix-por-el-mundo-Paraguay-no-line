<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FM MIX PARAGUAY</title>

<link rel="manifest" href="manifest.json">

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
}

.bg{
position:fixed;
width:100%;
height:100%;
background:url('logo.png') center/cover no-repeat;
filter:brightness(0.3);
z-index:-1;
}

.logo{
width:180px;
margin-top:20px;
border-radius:20px;
}

.hora{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

.clima{
font-size:18px;
margin-top:10px;
}

.btn{
padding:12px 20px;
margin:10px;
border:none;
border-radius:20px;
font-size:16px;
}

.play{background:#00ffcc;color:black;}
.stop{background:#ff0033;color:white;}

.noticias{
margin-top:20px;
padding:10px;
font-size:14px;
}

.monedas{
margin-top:10px;
font-size:16px;
color:#00ff00;
}

.whatsapp{
position:fixed;
right:15px;
bottom:100px;
background:#25d366;
padding:15px;
border-radius:50%;
font-size:22px;
}

.install{
position:fixed;
top:10px;
right:10px;
background:#00c853;
padding:10px;
border-radius:10px;
display:none;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="install" id="installBtn">📲 Instalar</div>

<img src="logo.png" class="logo">

<div class="hora" id="hora"></div>
<div class="clima" id="clima">Cargando clima...</div>

<!-- 🎧 REPRODUCTOR SOLUCIONADO -->
<iframe 
src="https://uk21freenew.listen2myradio.com/public/fm_mix_paraguay" 
width="100%" 
height="120" 
frameborder="0" 
allow="autoplay">
</iframe>

<div class="monedas" id="monedas">💵 Cargando monedas...</div>

<div class="noticias" id="noticias">📰 Cargando noticias...</div>

<a href="https://wa.me/5491131715838" class="whatsapp">💬</a>

<script>

// 🕒 HORA
setInterval(()=>{
document.getElementById("hora").innerHTML =
"🕒 " + new Date().toLocaleTimeString();
},1000);

// 🌎 CLIMA
let ciudades = ["Asuncion","Buenos Aires","Madrid","New York"];
let i = 0;

async function clima(){
try{
let res = await fetch("https://wttr.in/"+ciudades[i]+"?format=3");
let data = await res.text();

document.getElementById("clima").innerHTML =
"🌍 " + data;

i = (i+1)%ciudades.length;

}catch{
document.getElementById("clima").innerHTML="Error clima";
}
}

clima();
setInterval(clima,20000);

// 📰 NOTICIAS
async function noticias(){
try{
let res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss?hl=es-419");
let data = await res.json();

let html="";

data.items.slice(0,5).forEach(item=>{
html += "🔴 " + item.title + "<br><br>";
});

document.getElementById("noticias").innerHTML = html;

}catch{
document.getElementById("noticias").innerHTML="Error noticias";
}
}

noticias();
setInterval(noticias,60000);

// 💵 MONEDAS
function monedas(){
document.getElementById("monedas").innerHTML =
"💵 USD/ARS: 1100 🔴 USD/PYG: 7300 🔵 EUR: 1200 🟢";
}
monedas();
setInterval(monedas,60000);

// 📲 INSTALAR
let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt = e;
document.getElementById("installBtn").style.display="block";
});

document.getElementById("installBtn").onclick = ()=>{
if(deferredPrompt){
deferredPrompt.prompt();
}
};

</script>

</body>
</html>
