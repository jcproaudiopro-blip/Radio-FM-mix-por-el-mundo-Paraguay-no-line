<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FM MIX PARAGUAY</title>
<link rel="manifest" href="manifest.json">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#000,#111);
color:white;
text-align:center;
}

/* HEADER */
.header{
padding:20px;
font-size:22px;
font-weight:bold;
}

/* REPRODUCTOR */
.player{
margin-top:30px;
}

.boton{
width:90px;
height:90px;
border-radius:50%;
background:#00ffcc;
color:black;
font-size:30px;
display:flex;
align-items:center;
justify-content:center;
margin:20px auto;
cursor:pointer;
box-shadow:0 0 20px #00ffcc;
}

/* INFO */
.hora{font-size:22px;margin-top:10px;}
.clima{font-size:18px;margin-top:10px;}

/* NOTICIAS */
.noticias{
margin-top:20px;
padding:10px;
font-size:14px;
text-align:left;
max-width:400px;
margin-left:auto;
margin-right:auto;
}

/* INSTALAR */
.install{
position:fixed;
top:10px;
right:10px;
background:#00c853;
padding:10px;
border-radius:10px;
display:none;
}
</style>
</head>

<body>

<div class="install" id="installBtn">📲 Instalar</div>

<div class="header">📻 FM MIX PARAGUAY EN VIVO</div>

<!-- 🎧 PLAYER SIMPLE -->
<div class="player">
<div class="boton" onclick="toggleRadio()" id="btn">▶</div>
</div>

<audio id="radio" preload="auto">
<source src="https://uk21freenew.listen2myradio.com/live.mp3?typeportmount=s2_8973_stream_61144961" type="audio/mpeg">
</audio>

<div class="hora" id="hora"></div>
<div class="clima" id="clima">Cargando clima...</div>

<div class="noticias" id="noticias">📰 Cargando noticias...</div>

<script>

// 🎧 RADIO CONTROL SIMPLE
let radio = document.getElementById("radio");
let btn = document.getElementById("btn");
let jugando = false;

function toggleRadio(){
if(!jugando){
radio.play();
btn.innerHTML="⏸";
jugando=true;
}else{
radio.pause();
btn.innerHTML="▶";
jugando=false;
}
}

// 🔁 RECONEXIÓN AUTOMÁTICA
setInterval(()=>{
if(jugando && radio.paused){
radio.load();
radio.play().catch(()=>{});
}
},5000);

// 🕒 HORA
setInterval(()=>{
document.getElementById("hora").innerHTML =
"🕒 " + new Date().toLocaleTimeString();
},1000);

// 🌤️ CLIMA (3 PAÍSES)
let ciudades = ["Buenos Aires","Asuncion","Madrid"];
let i = 0;

async function clima(){
try{
let res = await fetch("https://wttr.in/"+ciudades[i]+"?format=3");
let data = await res.text();

document.getElementById("clima").innerHTML =
"🌍 " + data;

i = (i+1)%ciudades.length;

}catch{
document.getElementById("clima").innerHTML="Error clima";
}
}

clima();
setInterval(clima,20000);

// 📰 NOTICIAS GLOBAL
async function noticias(){
try{
let res = await fetch("https://api.allorigins.win/raw?url=https://news.google.com/rss?hl=es-419");
let text = await res.text();

let parser = new DOMParser();
let xml = parser.parseFromString(text,"text/xml");
let items = xml.querySelectorAll("item");

let html="";

items.forEach((item,i)=>{
if(i<6){
let titulo = item.querySelector("title").textContent;
html += "🔴 " + titulo + "<br><br>";
}
});

document.getElementById("noticias").innerHTML = html;

}catch{
document.getElementById("noticias").innerHTML="Error noticias";
}
}

noticias();
setInterval(noticias,60000);

// 📲 INSTALAR APP
let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt = e;
document.getElementById("installBtn").style.display="block";
});

document.getElementById("installBtn").onclick = ()=>{
if(deferredPrompt){
deferredPrompt.prompt();
}
};

</script>

</body>
</html>
